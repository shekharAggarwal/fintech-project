version: "3.8"

services:
  #-----------------------------------
  # TESTING DATABASE
  #-----------------------------------
  dbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: fintech_dbeaver
    ports:
      - "8978:8978"
    volumes:
      - dbeaver-data:/opt/cloudbeaver/workspace
    environment:
      - CB_SERVER_NAME=Fintech DBeaver
    networks:
      - fintech_net

  #-----------------------------------
  # MONITORING & LOGGING STACK
  #-----------------------------------
  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION}
    container_name: fintech_prometheus
    networks:
      - fintech_net
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy" ]
      interval: ${HEALTH_CHECK_INTERVAL}
      timeout: ${HEALTH_CHECK_TIMEOUT}
      retries: ${HEALTH_CHECK_RETRIES}
      start_period: ${HEALTH_CHECK_START_PERIOD}

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION}
    container_name: fintech_grafana
    networks:
      - fintech_net
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/fintech-monitoring-dashboard.json:/etc/grafana/provisioning/dashboards/fintech-monitoring-dashboard.json
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health" ]
      interval: ${HEALTH_CHECK_INTERVAL}
      timeout: ${HEALTH_CHECK_TIMEOUT}
      retries: ${HEALTH_CHECK_RETRIES}
      start_period: ${HEALTH_CHECK_START_PERIOD}

  jaeger:
    image: jaegertracing/all-in-one:${JAEGER_VERSION}
    container_name: fintech_jaeger
    networks:
      - fintech_net
    ports:
      - "16686:16686"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:16686/" ]
      interval: ${HEALTH_CHECK_INTERVAL}
      timeout: ${HEALTH_CHECK_TIMEOUT}
      retries: ${HEALTH_CHECK_RETRIES}
      start_period: ${HEALTH_CHECK_START_PERIOD}

  splunk:
    image: splunk/splunk:${SPLUNK_VERSION}
    container_name: fintech_splunk
    networks:
      - fintech_net
    ports:
      - "${SPLUNK_WEB_PORT}:8000"
      - "${SPLUNK_PORT}:8088"
    environment:
      SPLUNK_START_ARGS: --accept-license
      SPLUNK_PASSWORD: ${SPLUNK_PASSWORD}
      SPLUNK_HEC_TOKEN: ${SPLUNK_HEC_TOKEN}
    volumes:
      - splunk-data:/opt/splunk/var
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/en-US/account/login" ]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s

  #-----------------------------------
  # MESSAGE QUEUE & CACHE
  #-----------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:${ZOOKEEPER_VERSION}
    container_name: fintech_zookeeper
    networks:
      - fintech_net
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "2181" ]
      interval: ${HEALTH_CHECK_INTERVAL}
      timeout: ${HEALTH_CHECK_TIMEOUT}
      retries: ${HEALTH_CHECK_RETRIES}
      start_period: ${HEALTH_CHECK_START_PERIOD}

  kafka:
    image: confluentinc/cp-kafka:${KAFKA_VERSION}
    container_name: fintech_kafka
    networks:
      - fintech_net
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:${ZOOKEEPER_PORT}
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:${KAFKA_PORT}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:${KAFKA_PORT}" ]
      interval: ${HEALTH_CHECK_INTERVAL}
      timeout: ${HEALTH_CHECK_TIMEOUT}
      retries: ${HEALTH_CHECK_RETRIES}
      start_period: 60s

  rabbitmq:
    image: rabbitmq:${RABBITMQ_VERSION}
    container_name: fintech_rabbitmq
    networks:
      - fintech_net
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: ${HEALTH_CHECK_INTERVAL}
      timeout: ${HEALTH_CHECK_TIMEOUT}
      retries: ${HEALTH_CHECK_RETRIES}
      start_period: ${HEALTH_CHECK_START_PERIOD}

  fintech_redis:
    image: redis:${REDIS_VERSION}
    container_name: fintech_redis
    volumes:
      - redis-data:/data
    networks:
      - fintech_net
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: ${HEALTH_CHECK_INTERVAL}
      timeout: ${HEALTH_CHECK_TIMEOUT}
      retries: ${HEALTH_CHECK_RETRIES}
      start_period: ${HEALTH_CHECK_START_PERIOD}

  #-----------------------------------
  # ETCD for Patroni Consensus (Single Cluster)
  #-----------------------------------
  etcd:
    image: quay.io/coreos/etcd:${ETCD_IMAGE_VERSION}
    container_name: fintech_etcd
    networks:
      - fintech_net
    environment:
      ETCD_NAME: fintech-etcd
      ETCD_DATA_DIR: /etcd-data
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd:2380
      ETCD_INITIAL_CLUSTER: fintech-etcd=http://etcd:2380
      ETCD_INITIAL_CLUSTER_TOKEN: fintech-etcd-cluster
      ETCD_INITIAL_CLUSTER_STATE: new
    ports:
      - "2379:2379"
    volumes:
      - etcd-data:/etcd-data
    healthcheck:
      test: [ "CMD-SHELL", "etcdctl endpoint health || exit 1" ]
      interval: ${HEALTH_CHECK_INTERVAL}
      timeout: ${HEALTH_CHECK_TIMEOUT}
      retries: ${HEALTH_CHECK_RETRIES}
      start_period: ${HEALTH_CHECK_START_PERIOD}

  #-----------------------------------
  # PATRONI CLUSTERS (Main + 3 Shards)
  #-----------------------------------
  # Main Cluster
  patroni-main-master:
    image: patroni/patroni:${PATRONI_IMAGE_VERSION}
    container_name: fintech_patroni_main_master
    networks:
      - fintech_net
    environment:
      PATRONI_NAME: patroni-main-master
      PATRONI_SCOPE: fintech_main_cluster
      PATRONI_ETCD_HOSTS: etcd:2379
      PATRONI_RESTAPI_LISTEN: 0.0.0.0:8008
      PATRONI_RESTAPI_CONNECT_ADDRESS: patroni-main-master:8008
      PATRONI_POSTGRESQL_LISTEN: 0.0.0.0:5432
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: patroni-main-master:5432
      PATRONI_POSTGRESQL_DATA_DIR: /home/postgres/pgdata/fintech_main
      PATRONI_SUPERUSER_USERNAME: ${POSTGRES_USER}
      PATRONI_SUPERUSER_PASSWORD: ${POSTGRES_PASSWORD}
      PATRONI_REPLICATION_USERNAME: replicator
      PATRONI_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
      PATRONI_admin_PASSWORD: ${PATRONI_ADMIN_PASSWORD}
    ports:
      - "5432:5432"
      - "8008:8008"
    volumes:
      - patroni-main-master-data:/home/postgres/pgdata
      - ./patroni/patroni-main.yml:/home/postgres/patroni.yml
    depends_on:
      etcd:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: ${PG_HEALTH_CHECK_INTERVAL}
      timeout: ${PG_HEALTH_CHECK_TIMEOUT}
      retries: ${PG_HEALTH_CHECK_RETRIES}
      start_period: 60s

  patroni-main-replica:
    image: patroni/patroni:${PATRONI_IMAGE_VERSION}
    container_name: fintech_patroni_main_replica
    networks:
      - fintech_net
    environment:
      PATRONI_NAME: patroni-main-replica
      PATRONI_SCOPE: fintech_main_cluster
      PATRONI_ETCD_HOSTS: etcd:2379
      PATRONI_RESTAPI_LISTEN: 0.0.0.0:8008
      PATRONI_RESTAPI_CONNECT_ADDRESS: patroni-main-replica:8008
      PATRONI_POSTGRESQL_LISTEN: 0.0.0.0:5432
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: patroni-main-replica:5432
      PATRONI_POSTGRESQL_DATA_DIR: /home/postgres/pgdata/fintech_main
      PATRONI_SUPERUSER_USERNAME: ${POSTGRES_USER}
      PATRONI_SUPERUSER_PASSWORD: ${POSTGRES_PASSWORD}
      PATRONI_REPLICATION_USERNAME: replicator
      PATRONI_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
    ports:
      - "5442:5432"
      - "8009:8008"
    volumes:
      - patroni-main-replica-data:/home/postgres/pgdata
      - ./patroni/patroni-main.yml:/home/postgres/patroni.yml
    depends_on:
      - patroni-main-master
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: ${PG_HEALTH_CHECK_INTERVAL}
      timeout: ${PG_HEALTH_CHECK_TIMEOUT}
      retries: ${PG_HEALTH_CHECK_RETRIES}
      start_period: 60s

  # Shard 1 Cluster
  patroni-shard-1-master:
    image: patroni/patroni:${PATRONI_IMAGE_VERSION}
    container_name: fintech_patroni_shard_1_master
    networks:
      - fintech_net
    environment:
      PATRONI_NAME: patroni-shard-1-master
      PATRONI_SCOPE: fintech_shard_1_cluster
      PATRONI_ETCD_HOSTS: etcd:2379
      PATRONI_RESTAPI_LISTEN: 0.0.0.0:8008
      PATRONI_RESTAPI_CONNECT_ADDRESS: patroni-shard-1-master:8008
      PATRONI_POSTGRESQL_LISTEN: 0.0.0.0:5432
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: patroni-shard-1-master:5432
      PATRONI_POSTGRESQL_DATA_DIR: /home/postgres/pgdata/fintech_shard1
      PATRONI_SUPERUSER_USERNAME: ${POSTGRES_USER}
      PATRONI_SUPERUSER_PASSWORD: ${POSTGRES_PASSWORD}
      PATRONI_REPLICATION_USERNAME: replicator
      PATRONI_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
    ports:
      - "5433:5432"
      - "8010:8008"
    volumes:
      - patroni-shard-1-master-data:/home/postgres/pgdata
      - ./patroni/patroni-shard-1.yml:/home/postgres/patroni.yml
    depends_on:
      etcd:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: ${PG_HEALTH_CHECK_INTERVAL}
      timeout: ${PG_HEALTH_CHECK_TIMEOUT}
      retries: ${PG_HEALTH_CHECK_RETRIES}
      start_period: 60s

  patroni-shard-1-replica:
    image: patroni/patroni:${PATRONI_IMAGE_VERSION}
    container_name: fintech_patroni_shard_1_replica
    networks:
      - fintech_net
    environment:
      PATRONI_NAME: patroni-shard-1-replica
      PATRONI_SCOPE: fintech_shard_1_cluster
      PATRONI_ETCD_HOSTS: etcd:2379
      PATRONI_RESTAPI_LISTEN: 0.0.0.0:8008
      PATRONI_RESTAPI_CONNECT_ADDRESS: patroni-shard-1-replica:8008
      PATRONI_POSTGRESQL_LISTEN: 0.0.0.0:5432
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: patroni-shard-1-replica:5432
      PATRONI_POSTGRESQL_DATA_DIR: /home/postgres/pgdata/fintech_shard1
      PATRONI_SUPERUSER_USERNAME: ${POSTGRES_USER}
      PATRONI_SUPERUSER_PASSWORD: ${POSTGRES_PASSWORD}
      PATRONI_REPLICATION_USERNAME: replicator
      PATRONI_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
    ports:
      - "5443:5432"
      - "8011:8008"
    volumes:
      - patroni-shard-1-replica-data:/home/postgres/pgdata
      - ./patroni/patroni-shard-1.yml:/home/postgres/patroni.yml
    depends_on:
      - patroni-shard-1-master
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: ${PG_HEALTH_CHECK_INTERVAL}
      timeout: ${PG_HEALTH_CHECK_TIMEOUT}
      retries: ${PG_HEALTH_CHECK_RETRIES}
      start_period: 60s

  # Shard 2 Cluster
  patroni-shard-2-master:
    image: patroni/patroni:${PATRONI_IMAGE_VERSION}
    container_name: fintech_patroni_shard_2_master
    networks:
      - fintech_net
    environment:
      PATRONI_NAME: patroni-shard-2-master
      PATRONI_SCOPE: fintech_shard_2_cluster
      PATRONI_ETCD_HOSTS: etcd:2379
      PATRONI_RESTAPI_LISTEN: 0.0.0.0:8008
      PATRONI_RESTAPI_CONNECT_ADDRESS: patroni-shard-2-master:8008
      PATRONI_POSTGRESQL_LISTEN: 0.0.0.0:5432
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: patroni-shard-2-master:5432
      PATRONI_POSTGRESQL_DATA_DIR: /home/postgres/pgdata/fintech_shard2
      PATRONI_SUPERUSER_USERNAME: ${POSTGRES_USER}
      PATRONI_SUPERUSER_PASSWORD: ${POSTGRES_PASSWORD}
      PATRONI_REPLICATION_USERNAME: replicator
      PATRONI_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
    ports:
      - "5434:5432"
      - "8012:8008"
    volumes:
      - patroni-shard-2-master-data:/home/postgres/pgdata
      - ./patroni/patroni-shard-2.yml:/home/postgres/patroni.yml
    depends_on:
      etcd:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: ${PG_HEALTH_CHECK_INTERVAL}
      timeout: ${PG_HEALTH_CHECK_TIMEOUT}
      retries: ${PG_HEALTH_CHECK_RETRIES}
      start_period: 60s

  patroni-shard-2-replica:
    image: patroni/patroni:${PATRONI_IMAGE_VERSION}
    container_name: fintech_patroni_shard_2_replica
    networks:
      - fintech_net
    environment:
      PATRONI_NAME: patroni-shard-2-replica
      PATRONI_SCOPE: fintech_shard_2_cluster
      PATRONI_ETCD_HOSTS: etcd:2379
      PATRONI_RESTAPI_LISTEN: 0.0.0.0:8008
      PATRONI_RESTAPI_CONNECT_ADDRESS: patroni-shard-2-replica:8008
      PATRONI_POSTGRESQL_LISTEN: 0.0.0.0:5432
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: patroni-shard-2-replica:5432
      PATRONI_POSTGRESQL_DATA_DIR: /home/postgres/pgdata/fintech_shard2
      PATRONI_SUPERUSER_USERNAME: ${POSTGRES_USER}
      PATRONI_SUPERUSER_PASSWORD: ${POSTGRES_PASSWORD}
      PATRONI_REPLICATION_USERNAME: replicator
      PATRONI_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
    ports:
      - "5444:5432"
      - "8013:8008"
    volumes:
      - patroni-shard-2-replica-data:/home/postgres/pgdata
      - ./patroni/patroni-shard-2.yml:/home/postgres/patroni.yml
    depends_on:
      - patroni-shard-2-master
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: ${PG_HEALTH_CHECK_INTERVAL}
      timeout: ${PG_HEALTH_CHECK_TIMEOUT}
      retries: ${PG_HEALTH_CHECK_RETRIES}
      start_period: 60s

  # Shard 3 Cluster
  patroni-shard-3-master:
    image: patroni/patroni:${PATRONI_IMAGE_VERSION}
    container_name: fintech_patroni_shard_3_master
    networks:
      - fintech_net
    environment:
      PATRONI_NAME: patroni-shard-3-master
      PATRONI_SCOPE: fintech_shard_3_cluster
      PATRONI_ETCD_HOSTS: etcd:2379
      PATRONI_RESTAPI_LISTEN: 0.0.0.0:8008
      PATRONI_RESTAPI_CONNECT_ADDRESS: patroni-shard-3-master:8008
      PATRONI_POSTGRESQL_LISTEN: 0.0.0.0:5432
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: patroni-shard-3-master:5432
      PATRONI_POSTGRESQL_DATA_DIR: /home/postgres/pgdata/fintech_shard3
      PATRONI_SUPERUSER_USERNAME: ${POSTGRES_USER}
      PATRONI_SUPERUSER_PASSWORD: ${POSTGRES_PASSWORD}
      PATRONI_REPLICATION_USERNAME: replicator
      PATRONI_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
    ports:
      - "5435:5432"
      - "8014:8008"
    volumes:
      - patroni-shard-3-master-data:/home/postgres/pgdata
      - ./patroni/patroni-shard-3.yml:/home/postgres/patroni.yml
    depends_on:
      etcd:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: ${PG_HEALTH_CHECK_INTERVAL}
      timeout: ${PG_HEALTH_CHECK_TIMEOUT}
      retries: ${PG_HEALTH_CHECK_RETRIES}
      start_period: 60s

  patroni-shard-3-replica:
    image: patroni/patroni:${PATRONI_IMAGE_VERSION}
    container_name: fintech_patroni_shard_3_replica
    networks:
      - fintech_net
    environment:
      PATRONI_NAME: patroni-shard-3-replica
      PATRONI_SCOPE: fintech_shard_3_cluster
      PATRONI_ETCD_HOSTS: etcd:2379
      PATRONI_RESTAPI_LISTEN: 0.0.0.0:8008
      PATRONI_RESTAPI_CONNECT_ADDRESS: patroni-shard-3-replica:8008
      PATRONI_POSTGRESQL_LISTEN: 0.0.0.0:5432
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: patroni-shard-3-replica:5432
      PATRONI_POSTGRESQL_DATA_DIR: /home/postgres/pgdata/fintech_shard3
      PATRONI_SUPERUSER_USERNAME: ${POSTGRES_USER}
      PATRONI_SUPERUSER_PASSWORD: ${POSTGRES_PASSWORD}
      PATRONI_REPLICATION_USERNAME: replicator
      PATRONI_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
    ports:
      - "5445:5432"
      - "8015:8008"
    volumes:
      - patroni-shard-3-replica-data:/home/postgres/pgdata
      - ./patroni/patroni-shard-3.yml:/home/postgres/patroni.yml
    depends_on:
      - patroni-shard-3-master
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: ${PG_HEALTH_CHECK_INTERVAL}
      timeout: ${PG_HEALTH_CHECK_TIMEOUT}
      retries: ${PG_HEALTH_CHECK_RETRIES}
      start_period: 60s

  # --- Specialized Database Services (keeping these as regular PostgreSQL) ---
  postgres-auth:
    image: postgres:${POSTGRES_VERSION}
    container_name: fintech_postgres_auth
    networks:
      - fintech_net
    ports:
      - "5436:5432"
    environment:
      POSTGRES_DB: fintech_auth
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGUSER: ${POSTGRES_USER}
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
      - ./postgres/init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d fintech_auth" ]
      interval: ${PG_HEALTH_CHECK_INTERVAL}
      timeout: ${PG_HEALTH_CHECK_TIMEOUT}
      retries: ${PG_HEALTH_CHECK_RETRIES}
      start_period: ${PG_HEALTH_CHECK_START_PERIOD}

  postgres-scheduler:
    image: postgres:${POSTGRES_VERSION}
    container_name: fintech_postgres_scheduler
    networks:
      - fintech_net
    ports:
      - "5437:5432"
    environment:
      POSTGRES_DB: fintech_scheduler
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGUSER: ${POSTGRES_USER}
    volumes:
      - postgres-scheduler-data:/var/lib/postgresql/data
      - ./postgres/init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d fintech_scheduler" ]
      interval: ${PG_HEALTH_CHECK_INTERVAL}
      timeout: ${PG_HEALTH_CHECK_TIMEOUT}
      retries: ${PG_HEALTH_CHECK_RETRIES}
      start_period: ${PG_HEALTH_CHECK_START_PERIOD}

  postgres-retry:
    image: postgres:${POSTGRES_VERSION}
    container_name: fintech_postgres_retry
    networks:
      - fintech_net
    ports:
      - "5438:5432"
    environment:
      POSTGRES_DB: fintech_retry
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGUSER: ${POSTGRES_USER}
    volumes:
      - postgres-retry-data:/var/lib/postgresql/data
      - ./postgres/init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d fintech_retry" ]
      interval: ${PG_HEALTH_CHECK_INTERVAL}
      timeout: ${PG_HEALTH_CHECK_TIMEOUT}
      retries: ${PG_HEALTH_CHECK_RETRIES}
      start_period: ${PG_HEALTH_CHECK_START_PERIOD}

  # ShardingSphere Proxy
  shardingsphere-proxy:
    build:
      context: ./shardingsphere
      dockerfile: Dockerfile
    container_name: fintech_shardingsphere_proxy
    networks:
      - fintech_net
    ports:
      - "3307:3307"
    environment:
      PORT: 3307
      JVM_OPTS: "-Xmx2g -Xms1g"
    volumes:
      - ./shardingsphere/config:/opt/shardingsphere-proxy/conf
    depends_on:
      patroni-main-master:
        condition: service_healthy
      patroni-shard-1-master:
        condition: service_healthy
      patroni-shard-2-master:
        condition: service_healthy
      patroni-shard-3-master:
        condition: service_healthy
      patroni-main-replica:
        condition: service_healthy
      patroni-shard-1-replica:
        condition: service_healthy
      patroni-shard-2-replica:
        condition: service_healthy
      patroni-shard-3-replica:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/localhost/3307" ]
      interval: ${HEALTH_CHECK_INTERVAL}
      timeout: ${HEALTH_CHECK_TIMEOUT}
      retries: ${HEALTH_CHECK_RETRIES}
      start_period: 90s



  #-----------------------------------
  # INFRASTRUCTURE & PLATFORM SERVICES
  #-----------------------------------
  config-server:
    build:
      context: ../services/config-server
    container_name: fintech_config_server
    networks:
      - fintech_net
    ports:
      - "8888:8888"
    volumes:
      - ../services/config-repo/default:/config
    environment:
      SPRING_PROFILES_ACTIVE: native
      SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS: /config
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8888/actuator/health" ]
      interval: ${PG_HEALTH_CHECK_INTERVAL}
      timeout: ${PG_HEALTH_CHECK_TIMEOUT}
      retries: 30
      start_period: ${PG_HEALTH_CHECK_START_PERIOD}

  #-----------------------------------
  # APPLICATION MICROSERVICES
  #-----------------------------------
  gateway-service:
    build: ../services/gateway-service
    container_name: fintech_gateway_service
    networks:
      - fintech_net
    ports:
      - "${GATEWAY_SERVICE_PORT}:${GATEWAY_SERVICE_PORT}"
    volumes:
      - ../certs:/app/certs:ro
    env_file: .env
    depends_on:
      config-server:
        condition: service_healthy
      fintech_redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:${GATEWAY_SERVICE_PORT}/actuator/health" ]
      interval: ${HEALTH_CHECK_INTERVAL}
      timeout: ${HEALTH_CHECK_TIMEOUT}
      retries: ${HEALTH_CHECK_RETRIES}
      start_period: 60s

  auth-service:
    build: ../services/auth-service
    container_name: fintech_auth_service
    networks:
      - fintech_net
    env_file: .env
    volumes:
      - ../certs:/app/certs:ro
    depends_on:
      config-server:
        condition: service_healthy
      fintech_redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:${AUTH_SERVICE_PORT}/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  authorization-service:
    build: ../services/authorization-service
    container_name: fintech_authorization_service
    networks:
      - fintech_net
    env_file: .env
    volumes:
      - ../certs:/app/certs:ro
    depends_on:
      config-server:
        condition: service_healthy
      postgres-auth:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:${AUTHORIZATION_SERVICE_PORT}/actuator/health" ]
      interval: ${HEALTH_CHECK_INTERVAL}
      timeout: ${HEALTH_CHECK_TIMEOUT}
      retries: ${HEALTH_CHECK_RETRIES}
      start_period: 60s

  user-service:
    build: ../services/user-service
    container_name: fintech_user_service
    networks:
      - fintech_net
    env_file: .env
    depends_on:
      config-server:
        condition: service_healthy
      shardingsphere-proxy:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:${USER_SERVICE_PORT}/actuator/health" ]
      interval: ${HEALTH_CHECK_INTERVAL}
      timeout: ${HEALTH_CHECK_TIMEOUT}
      retries: ${HEALTH_CHECK_RETRIES}
      start_period: 60s

  payment-service:
    build: ../services/payment-service
    container_name: fintech_payment_service
    networks:
      - fintech_net
    env_file: .env
    depends_on:
      config-server:
        condition: service_healthy
      shardingsphere-proxy:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:${PAYMENT_SERVICE_PORT}/actuator/health" ]
      interval: ${HEALTH_CHECK_INTERVAL}
      timeout: ${HEALTH_CHECK_TIMEOUT}
      retries: ${HEALTH_CHECK_RETRIES}
      start_period: 60s

  transaction-service:
    build: ../services/transaction-service
    container_name: fintech_transaction_service
