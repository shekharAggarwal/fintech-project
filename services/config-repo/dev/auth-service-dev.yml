server:
  port: 8081

spring:
  application:
    name: auth-service
  
  # Database Configuration - Direct connection for local development
  # This bypasses ShardingSphere-Proxy for simplicity
  datasource:
    url: jdbc:postgresql://localhost:5432/fintech_main
    username: fintech_user
    password: fintech_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      leak-detection-threshold: 60000
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update  # Changed to update for easier local development
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        batch_size: 20
        order_inserts: true
        order_updates: true
        jdbc:
          batch_size: 20
          batch_versioned_data: true
    open-in-view: false
  
  # Redis Configuration
  data:
    redis:
      database: 0
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          max-wait: -1ms
  
  # RabbitMQ Configuration
  rabbitmq:
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      retry:
        enabled: true
        initial-interval: 1000ms
        max-attempts: 3
        max-interval: 10000ms
        multiplier: 2.0

# JWT Configuration
jwt:
  # IMPORTANT: This path must be valid on your local development machine.
  keystore-path: C:/spring-boot/fintech-project/certs/jwt-keystore.p12
  keystore-password: Shekhar@123
  key-alias: jwt-key
  access-token-expiration: 900000  # 15 minutes
  refresh-token-expiration: 86400000  # 24 hours

# Security Configuration
security:
  password:
    min-length: 8
    require-uppercase: true
    require-lowercase: true
    require-digit: true
    require-special-char: true
  session:
    timeout: 1800000  # 30 minutes
    max-sessions: 1
  rate-limiting:
    enabled: true
    max-requests: 100
    window-size: 60
  audit:
    enabled: true
    retention-days: 90

# Business Logic Configuration
business:
  initial-deposit:
    minimum: 100.00
    maximum: 50000.00
  account:
    number:
      length: 12
      prefix: "ACC"
