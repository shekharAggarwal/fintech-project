server:
  port: 8081

spring:
  application:
    name: auth-service
  
  # Database Configuration - Direct connection for local development
  # This bypasses ShardingSphere-Proxy for simplicity
  datasource:
    url: jdbc:postgresql://localhost:5433/fintech_shard1
    username: fintech_user
    password: fintech_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      leak-detection-threshold: 60000
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update  # Changed to update for easier local development
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        batch_size: 20
        order_inserts: true
        order_updates: true
        jdbc:
          batch_size: 20
          batch_versioned_data: true
    open-in-view: false
  
  # Redis Configuration
  data:
    redis:
      database: 0
      host: localhost
      port: 6379
      password: 
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          max-wait: -1ms
  
  # RabbitMQ Configuration
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      retry:
        enabled: true
        initial-interval: 1000ms
        max-attempts: 3
        max-interval: 10000ms
        multiplier: 2.0

# JWT Configuration
jwt:
  # IMPORTANT: This path must be valid on your local development machine.
  keystore-path: C:/spring-boot/fintech-project/certs/jwt-keystore.p12
  keystore-password: Shekhar@123
  key-alias: jwt-key
  access-token-expiration: 900000  # 15 minutes
  refresh-token-expiration: 86400000  # 24 hours

# Security Configuration
security:
  password:
    min-length: 8
    require-uppercase: true
    require-lowercase: true
    require-digit: true
    require-special-char: true
  session:
    timeout: 1800000  # 30 minutes
    max-sessions: 1
  rate-limiting:
    enabled: true
    max-requests: 100
    window-size: 60
  audit:
    enabled: true
    retention-days: 90

# Logging Configuration
logging:
  level:
    com.fintech.auth: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.boot.autoconfigure.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      databaseCall:
        registerHealthIndicator: true
        slidingWindowSize: 100
        permittedNumberOfCallsInHalfOpenState: 10
        waitDurationInOpenState: 60000
        failureRateThreshold: 50
        minimumNumberOfCalls: 20
  retry:
    instances:
      databaseCall:
        maxAttempts: 3
        waitDuration: 1000
        retryExceptions:
          - java.sql.SQLException
          - org.springframework.dao.DataAccessException
  ratelimiter:
    instances:
      authEndpoints:
        limitForPeriod: 10
        limitRefreshPeriod: 60s
        timeoutDuration: 0s

# Business Logic Configuration
business:
  initial-deposit:
    minimum: 100.00
    maximum: 50000.00
  account:
    number:
      length: 12
      prefix: "ACC"
