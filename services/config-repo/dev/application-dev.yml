spring:
  cloud:
    config:
      fail-fast: true
  
  # Common JPA Configuration for local development
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
  
  # Common infrastructure configuration for local development
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  redis:
    host: localhost
    port: 6379
    password:
    timeout: 2000ms
  kafka:
    bootstrap-servers: localhost:9092
  quartz:
    job-store-type: memory
    properties:
      org.quartz.scheduler.instanceName: fintech-scheduler-dev
      org.quartz.threadPool.threadCount: 10

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces


logging:
  level:
    com.fintech: DEBUG
    org.springframework.web: INFO
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"

# Default Resilience4j configurations
resilience4j:
  circuitbreaker:
    instances:
      default:
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
  retry:
    instances:
      default:
        maxAttempts: 3
        waitDuration: 1s
  ratelimiter:
    instances:
      default:
        limitForPeriod: 50
        limitRefreshPeriod: 1s
        timeoutDuration: 500ms
