spring:
  cloud:
    config:
      fail-fast: true
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/fintechdb
    username: fintech
    password: fintech123
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  redis:
    host: localhost
    port: 6379
  redisson:
    address: redis://localhost:6379
  kafka:
    bootstrap-servers: localhost:9092
  quartz:
    job-store-type: memory
    scheduler-name: fintech-scheduler
    properties:
      org:
        quartz:
          scheduler:
            instanceName: fintech-scheduler
          threadPool:
            threadCount: 10
management:
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    enabled: true
  metrics:
    export:
      simple:
        enabled: true
  health:
    defaults:
      enabled: true

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    com.fintech: DEBUG

resilience4j:
  circuitbreaker:
    instances:
      default:
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
  retry:
    instances:
      default:
        maxAttempts: 3
        waitDuration: 5s
  ratelimiter:
    instances:
      default:
        limitForPeriod: 50
        limitRefreshPeriod: 1s
        timeoutDuration: 500ms
splunk:
  host: localhost
  token: ${SPLUNK_TOKEN}
  index: fintech-logs
  web-port: ${SPLUNK_WEB_PORT}
  username: ${SPLUNK_USERNAME}
  password: ${SPLUNK_PASSWORD}
