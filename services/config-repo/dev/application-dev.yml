spring:
  cloud:
    config:
      fail-fast: true
  
  # Common configuration imports
  config:
    import:
      - ./common-logging-config-dev.yml
      - ./common-observability-config-dev.yml
    # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update  # Creates tables automatically if they don't exist
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        batch_size: 20
        order_inserts: true
        order_updates: true
        jdbc:
          batch_size: 20
          batch_versioned_data: true
    open-in-view: false

  # Common infrastructure configuration for local development
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          max-wait: -1ms

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  kafka:
    bootstrap-servers: localhost:9092
#  quartz:
#    job-store-type: memory

# RabbitMQ Configuration
rabbitmq:
  exchange:
    user: fintech.user.exchange
    authorization: fintech.authorization.exchange
    notification: fintech.notification.exchange
  queue:
    user-creation: fintech.user.creation.queue
    session-creation: fintech.authorization.session.creation.queue
    email: fintech.notification.email.queue
  routing-key:
    user-creation: user.creation
    session-creation: session.creation
    email: fintech.notification.email

kafka:
  topics:
    user-creation: fintech.user.creation
    session-creation: fintech.authorization.session.creation
    user-role-registration: fintech.authorization.user.role.registration

server:
  ssl:
    enabled: true
    # IMPORTANT: Replace with the actual path on your local machine
    key-store: C:/spring-boot/fintech-project/certs/fintech.p12
    key-store-password: Shekhar@123
    key-store-type: PKCS12
    key-alias: gateway-ssl
    trust-store: C:/spring-boot/fintech-project/certs/fintech-truststore.jks
    trust-store-password: Shekhar@123

# TLS Client Configuration for Gateway Service
tls:
  client:
    key-store: file:///C:/spring-boot/fintech-project/certs/fintech.p12
    key-store-password: Shekhar@123
    trust-store: file:///C:/spring-boot/fintech-project/certs/fintech-truststore.jks
    trust-store-password: Shekhar@123

security:
  session:
    expiry: 600000  # 10 minutes