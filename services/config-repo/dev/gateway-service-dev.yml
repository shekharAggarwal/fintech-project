server:
  port: 8080
  ssl:
    enabled: true
    # IMPORTANT: Replace with the actual path on your local machine
    key-store: C:/spring-boot/fintech-project/certs/fintech.p12
    key-store-password: Shekhar@123
    key-store-type: PKCS12
    key-alias: gateway-ssl
jwt:
  public-cert-path: C:/spring-boot/fintech-project/certs/jwt-public.crt
spring:
  application:
    name: gateway-service-dev
  cloud:
    gateway:
      preserveHostHeader: true
      # Routes point to other services running on localhost at their respective ports
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: authorization-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/authorization/**
        - id: user-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/user/**
        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/payment/**
        - id: transaction-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/transaction/**
        - id: notification-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/notification/**
        - id: reporting-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/reporting/**
        - id: scheduler-service
          uri: http://localhost:8090
          predicates:
            - Path=/api/scheduler/**
        - id: retry-service
          uri: http://localhost:8091
          predicates:
            - Path=/api/retry/**
