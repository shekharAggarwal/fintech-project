server:
  port: 8089

spring:
  application:
    name: user-service
  
  # Disable Eureka client for local development
  cloud:
    discovery:
      enabled: false

  # Database Configuration using ShardingSphere-Proxy
  datasource:
    url: jdbc:postgresql://localhost:5432/fintech_main
    username: fintech_user
    password: fintech_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      leak-detection-threshold: 60000
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  
  data:
    redis:
      database: 2 # Redis DB for user caching
  
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

resilience4j:
  circuitbreaker:
    instances:
      user-cache:
        sliding-window-size: 50
        minimum-number-of-calls: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 10s
  retry:
    instances:
      user-retry:
        max-attempts: 3
        wait-duration: 500ms
  timelimiter:
    instances:
      user-service:
        timeout-duration: 5s
