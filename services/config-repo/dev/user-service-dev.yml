server:
  port: 8089
  ssl:
    client-auth: need

spring:
  application:
    name: user-service
  
  # Disable Eureka client for local development
  cloud:
    discovery:
      enabled: false

  # Database Configuration using ShardingSphere-Proxy
  datasource:
    url: jdbc:postgresql://localhost:5432/fintech_main
    username: fintech_user
    password: fintech_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      leak-detection-threshold: 60000
  
  data:
    redis:
      database: 2

  # Kafka Configuration for internal service communications
  kafka:
    consumer:
      group-id: user-service-group
      client-id: user-service-consumer
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: com.fintech.userservice.dto,com.fintech.authservice.dto.response
        enable.auto.commit: false
        auto.offset.reset: earliest
        max.poll.records: 10
    producer:
      client-id: user-service-producer
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
        retry.backoff.ms: 1000
        batch.size: 16384
        linger.ms: 5
        compression.type: snappy

  # RabbitMQ Configuration for email notifications
  rabbitmq:
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      retry:
        enabled: true
        initial-interval: 1000ms
        max-attempts: 3
        max-interval: 10000ms
        multiplier: 2.0

resilience4j:
  circuitbreaker:
    instances:
      user-cache:
        sliding-window-size: 50
        minimum-number-of-calls: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 10s
  retry:
    instances:
      user-retry:
        max-attempts: 3
        wait-duration: 500ms
  timelimiter:
    instances:
      user-service:
        timeout-duration: 5s
