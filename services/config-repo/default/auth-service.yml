server:
  port: ${AUTH_SERVICE_PORT}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

spring:
  application:
    name: auth-service
  
  # Database Configuration using ShardingSphere-Proxy
  # This approach provides automatic sharding and read/write splitting
  datasource:
    # ShardingSphere-Proxy configuration (recommended for production)
    url: ${SHARDINGSPHERE_PROXY_URL}
  
  # Redis Configuration
  data:
    redis:
      database: 0
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          max-wait: -1ms

# JWT Configuration
jwt:
  keystore-path: ${JWT_KEYSTORE_PATH}
  keystore-password: ${JWT_KEYSTORE_PASSWORD}
  key-alias: ${JWT_KEY_ALIAS}
  access-token-expiration: 900000  # 15 minutes
  refresh-token-expiration: 86400000  # 24 hours

# Security Configuration
security:
  password:
    min-length: 8
    require-uppercase: true
    require-lowercase: true
    require-digit: true
    require-special-char: true
  session:
    timeout-minutes: 15
    max-concurrent-sessions: 1
    prevent-session-fixation: true

# Rate Limiting Configuration
rate-limit:
  login:
    max-attempts: 5
    window-minutes: 1
  registration:
    max-attempts: 3
    window-hours: 1
  password-reset:
    max-attempts: 2
    window-hours: 1

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      auth-service:
        sliding-window-size: 100
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        slow-call-duration-threshold: 5s
        slow-call-rate-threshold: 50
        permitted-number-of-calls-in-half-open-state: 5
      database:
        sliding-window-size: 50
        minimum-number-of-calls: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 10s
  retry:
    instances:
      auth-service:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.util.concurrent.TimeoutException
          - org.springframework.dao.DataAccessException
  timelimiter:
    instances:
      auth-service:
        timeout-duration: 5s

# Management and Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,configprops
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
      probes:
        enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  health:
    circuitbreakers:
      enabled: true
    ratelimiters:
      enabled: true
    redis:
      enabled: true
    db:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${SPRING_PROFILES_ACTIVE:default}
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
        "[resilience4j.circuitbreaker.calls]": true
  tracing:
    sampling:
      probability: 1.0

# Logging Configuration
logging:
  level:
    '[com.fintech]': INFO
    '[org.springframework.security]': WARN
    '[org.hibernate.SQL]': WARN
    '[org.hibernate.type.descriptor.sql.BasicBinder]': WARN
    '[AUDIT]': INFO
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
    console: "%d{ISO8601} ${LOG_LEVEL_PATTERN:-%5p} [%t] [%X{traceId:-},%X{spanId:-}] %-40.40logger{39} : %m%n"
  appender:
    audit:
      name: AUDIT_FILE
      file: logs/audit.log
      pattern: "%d{ISO8601} [%X{traceId:-},%X{spanId:-}] [%X{eventType:-}] [%X{userId:-}] [%X{ipAddress:-}] %m%n"
